name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test - ${{ matrix.project }}
    runs-on: windows-latest
    strategy:
      fail-fast: false # Si un plugin plante, on continue de tester les autres
      matrix:
        # La liste de tous tes sous-dossiers contenant un Cargo.toml
        project: [EpiKodi, plugin_api, plugin_music, tmdb_plugin]

    # On dit à Github de se placer dans le bon dossier pour chaque job
    defaults:
      run:
        working-directory: ./${{ matrix.project }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust (pour aller plus vite)
        uses: Swatinem/rust-cache@v2
        with:
          # On adapte le cache pour chaque sous-dossier
          workspaces: ./${{ matrix.project }} -> target

      - name: Vérification du formatage
        run: cargo fmt --all -- --check

      - name: Linter (Clippy)
        run: cargo clippy --all-targets --all-features

      - name: Lancement des tests
        run: cargo test --verbose